services:
  app:
    image: gitshow
    container_name: gitshow
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    volumes:
      - ./config.json:/app/config.json:ro
      - ./settings.json:/app/settings.json
      - ./star-history.json:/app/star-history.json
    restart: unless-stopped
