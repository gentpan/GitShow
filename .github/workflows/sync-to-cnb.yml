name: Sync to CNB

on:
  push:
    branches:
      - '**'
    tags:
      - '**'

permissions:
  contents: read

concurrency:
  group: sync-to-cnb-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push branches and tags to CNB
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
          CNB_REPO: xifeng-github/GitShow
        run: |
          set -euo pipefail
          if [ -z "${CNB_TOKEN}" ]; then
            echo "CNB_TOKEN secret is missing" >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add cnb "https://cnb.cool/${CNB_REPO}.git"
          git -c http.https://cnb.cool/.extraheader="Authorization: Basic $(printf 'cnb:%s' "${CNB_TOKEN}" | base64 -w0)"             push --prune cnb '+refs/heads/*:refs/heads/*' '+refs/tags/*:refs/tags/*'
